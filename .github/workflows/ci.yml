name: VibeCoder CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install ruff
      - name: Lint with ruff
        run: |
          ruff check .

  build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      - name: Build check
        run: |
          python -m compileall src/

  test_and_regression:
    name: Tests and Regression Validation
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      - name: Run Pytest (Unit, Integration, E2E)
        run: |
          pytest tests/ --junitxml=test-results.xml

  regression_validation:
    name: Regression Validation (BUZZ-ZAP)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      - name: Run Regression Tests
        run: |
          pytest tests/regression/ --junitxml=regression-results.xml
      - name: Upload Regression Results
        uses: actions/upload-artifact@v4
        with:
          name: regression-results
          path: regression-results.xml

  coverage_validation:
    runs-on: ubuntu-latest
    needs: [test_and_regression, regression_validation]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      - name: Run coverage
        run: |
          coverage run -m pytest tests/
          coverage xml -o coverage.xml
          coverage report --fail-under=80
      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  version_validation:
    runs-on: ubuntu-latest
    needs: coverage_validation
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate Version Change
        run: |
          git fetch origin main || true
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_REF="origin/main"
          else
            BASE_REF="HEAD~1"
          fi
          
          if ! git rev-parse "$BASE_REF" >/dev/null 2>&1; then
             echo "Cannot find base reference. Assuming first run."
             exit 0
          fi
          
          if ! git diff --name-only $BASE_REF HEAD | grep -q "src/vibe_coder/version.py"; then
             echo "::error::Version unchanged! You must bump the version in src/vibe_coder/version.py for any changes."
             exit 1
          else
             echo "Version validation passed."
          fi

  docker_build_check:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker Image
        run: |
          docker build -t vibecoder:latest -f docker/Dockerfile .
